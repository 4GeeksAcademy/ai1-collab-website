<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>Your Cart | Petco</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                petco: {
                    navy: 'rgb(0 25 82)',
                    blue: 'rgb(0 157 220)',
                    green: 'rgb(136 198 90)'
                }
            },
            fontFamily: {
                petco: ['Petco Circular', 'Segoe UI', 'Roboto', 'sans-serif']
            }
        }
    }
}
</script>
</head>

<body class="font-petco flex min-h-screen flex-col bg-slate-100 text-petco-navy">

<header class="sticky top-0 z-50 px-3 pt-3 md:px-6">
<nav class="navbar-shell mx-auto w-full max-w-7xl rounded-2xl border p-3 flex justify-between">
<a href="index.html">
    <img src="assets/petco_logo_2025.png" class="h-10">
</a>
</nav>
</header>

<main class="flex-1 px-4 py-8 md:px-6">

<div class="max-w-7xl mx-auto">
<h1 class="text-2xl font-bold mb-6">Your Cart</h1>

<div class="grid gap-6 md:grid-cols-3">

<!-- ITEMS -->
<div class="md:col-span-2 space-y-4">

<!-- 🐶 DOG FOOD -->
<div class="cart-item flex gap-4 bg-white p-4 rounded-2xl shadow-sm">
    <img 
        src="https://images.unsplash.com/photo-1518717758536-85ae29035b6d?w=200"
        onerror="this.src='assets/fallback.png'"
        class="h-20 w-20 rounded-lg object-cover"
    >

    <div class="flex-1">
        <h2 class="font-semibold">Dog Food</h2>
        <p class="text-sm text-slate-500">$10.00 each</p>

        <div class="mt-2 flex items-center gap-2">
            <button onclick="changeQty(this, -1)" class="px-2 py-1 border rounded">−</button>
            <input type="number" value="2" class="w-16 border rounded px-2 py-1 text-sm text-center">
            <button onclick="changeQty(this, 1)" class="px-2 py-1 border rounded">+</button>
        </div>
    </div>

    <div class="font-semibold">$20.00</div>
</div>

<!-- 🐱 CAT FOOD -->
<div class="cart-item flex gap-4 bg-white p-4 rounded-2xl shadow-sm">
    <img 
        src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=200"
        onerror="this.src='assets/fallback.png'"
        class="h-20 w-20 rounded-lg object-cover"
    >

    <div class="flex-1">
        <h2 class="font-semibold">Cat Food</h2>
        <p class="text-sm text-slate-500">$15.00 each</p>

        <div class="mt-2 flex items-center gap-2">
            <button onclick="changeQty(this, -1)" class="px-2 py-1 border rounded">−</button>
            <input type="number" value="1" class="w-16 border rounded px-2 py-1 text-sm text-center">
            <button onclick="changeQty(this, 1)" class="px-2 py-1 border rounded">+</button>
        </div>
    </div>

    <div class="font-semibold">$15.00</div>
</div>

<!-- 🐦 BIRD FOOD -->
<div class="cart-item flex gap-4 bg-white p-4 rounded-2xl shadow-sm">
    <img 
        src="https://images.unsplash.com/photo-1452570053594-1b985d6ea890?auto=format&fit=crop&w=200&q=80"
        onerror="this.onerror=null;this.src='assets/fallback.png'"
        class="h-20 w-20 rounded-lg object-cover"
    >

    <div class="flex-1">
        <h2 class="font-semibold">Bird Food</h2>
        <p class="text-sm text-slate-500">$12.00 each</p>

        <div class="mt-2 flex items-center gap-2">
            <button onclick="changeQty(this, -1)" class="px-2 py-1 border rounded">−</button>
            <input type="number" value="1" class="w-16 border rounded px-2 py-1 text-sm text-center">
            <button onclick="changeQty(this, 1)" class="px-2 py-1 border rounded">+</button>
        </div>
    </div>

    <div class="font-semibold">$12.00</div>
</div>

</div>

<!-- SUMMARY -->
<div class="bg-white p-6 rounded-2xl shadow-sm h-fit">

<h2 class="text-lg font-semibold mb-4">Order Summary</h2>

<div class="space-y-2 text-sm">
    <div class="flex justify-between">
        <span>Subtotal</span>
        <span>$47.00</span>
    </div>

    <div class="flex justify-between">
        <span>Tax</span>
        <span>$3.76</span>
    </div>

    <div class="flex justify-between font-bold pt-3 border-t">
        <span>Total</span>
        <span>$50.76</span>
    </div>
</div>

<!-- 🛒 CHECKOUT BUTTON (RESTORED) -->
<button class="mt-6 w-full bg-petco-navy text-white py-3 rounded-xl font-semibold shadow-md hover:bg-petco-blue hover:shadow-lg transition cursor-pointer">
    Checkout
</button>

</div>

</div>
</div>

</main>

<script>
function changeQty(button, delta) {
    const container = button.parentElement;
    const input = container.querySelector("input");

    let value = parseInt(input.value) || 0;
    value += delta;

    if (value < 1) value = 1;

    input.value = value;
}
</script>

</body>
</html>
