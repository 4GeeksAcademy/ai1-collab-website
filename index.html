<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Petco | Where the pets go.</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                petco: {
                    navy: 'rgb(0 25 82)',
                    blue: 'rgb(0 157 220)',
                    green: 'rgb(136 198 90)'
                }
            },
            fontFamily: {
                petco: ['Petco Circular', 'Segoe UI', 'Roboto', 'sans-serif']
            }
        }
    }
}
</script>

<link rel="stylesheet" href="style.css">
</head>

<body class="font-petco flex min-h-screen flex-col bg-slate-100 text-petco-navy">

<!-- HEADER -->
<header class="sticky top-0 z-50 px-3 pt-3 md:px-6">
<nav class="navbar-shell mx-auto w-full max-w-7xl rounded-2xl border border-petco-navy/20 p-3 md:p-4">

<div class="flex flex-wrap items-center gap-3 md:gap-4">

<!-- Logo -->
<a href="index.html" class="flex items-center gap-2">
    <img src="assets/petco_logo_2025.png" class="h-10">
</a>

<!-- Search -->
<form class="w-full md:max-w-md md:ml-auto">
    <input type="search" placeholder="Search food, toys, treats..."
    class="w-full rounded-xl border px-3 py-2">
</form>

<!-- Account -->
<details class="account-menu ml-auto">
    <summary class="rounded-xl bg-petco-navy px-3 py-2 text-white cursor-pointer">
        Account
    </summary>

    <div class="absolute right-3 mt-2 w-44 bg-white rounded-xl shadow-xl p-2">
        <a href="#" class="block px-3 py-2 hover:bg-slate-100">Sign in</a>
        <a href="#" class="block px-3 py-2 hover:bg-slate-100">Orders</a>
    </div>
</details>

<!-- CART ICON -->
<a href="cart.html" class="ml-2 relative bg-white border rounded-xl px-3 py-2 hover:bg-slate-100">

    <svg class="h-5 w-5 text-petco-navy" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M6 6h15l-1.5 9h-13z"/>
        <circle cx="9" cy="20" r="1"/>
        <circle cx="18" cy="20" r="1"/>
    </svg>

    <span class="absolute -top-1 -right-1 bg-petco-green text-xs px-1.5 rounded-full">
        2
    </span>
</a>

</div>
</nav>
</header>

<!-- MAIN -->
<main class="flex-1 px-4 py-8 md:px-6">

<section>
    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold">Welcome to Petco</h1>
        <p class="mt-2 text-slate-600">Your shopping experience starts here.</p>
    </div>
</section>

</main>

</body>
</html>
